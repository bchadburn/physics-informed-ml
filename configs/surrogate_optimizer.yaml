# configs/surrogate_optimizer.yaml
defaults:
  - base
  - _self_

optimization:
  h_min: 20.0
  operating_hours: 0.0
  n_steps: 500
  lr: 0.01
  penalty_weight: 100.0

baselines:
  random_n_samples: 10000
  grid_n: 100

model:
  ensemble_dir: models/pump_ensemble
  n_members: 5
  hidden_dims: [64, 64, 64]
  activation: tanh
  dropout: 0.0
  lambda_data: 1.0
  lambda_physics: 0.01
  lr: 1.0e-3
  mse_warmup_epochs: 50
  max_epochs: 150
  quick_train_epochs: 80

logging:
  mlflow_tracking_uri: mlruns
  experiment_name: surrogate_optimizer
